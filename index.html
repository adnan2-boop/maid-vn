<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maid Service - Pelayan Seksual</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Georgia', serif;
    }
    .dialogue-box {
      background: rgba(0, 0, 0, 0.85);
      border: 2px solid #ec4899;
    }
  </style>
</head>
<body class="bg-black text-white min-h-screen overflow-hidden">
  <div class="max-w-4xl mx-auto h-screen flex flex-col">
    <!-- Header -->
    <div class="p-4 border-b border-pink-500/30 flex justify-between items-center bg-black/80">
      <div class="flex items-center gap-3">
        <div class="text-2xl">🖤</div>
        <div>
          <h1 class="text-2xl font-bold text-pink-400">Maid Service</h1>
          <p class="text-xs text-pink-300">Pelayan Seksual Pribadi</p>
        </div>
      </div>
      <button onclick="resetGame()" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-lg text-sm">Restart</button>
    </div>

    <!-- Game Area -->
    <div id="scene" class="flex-1 relative bg-cover bg-center" style="background-image: url('https://picsum.photos/id/1015/1920/1080')">
      <div class="absolute inset-0 bg-black/50"></div>
      
      <!-- Character -->
      <img id="character" src="https://picsum.photos/id/64/600/800" class="absolute bottom-0 right-10 h-4/5 object-contain transition-all" alt="Mia">

      <!-- Dialogue -->
      <div class="absolute bottom-8 left-4 right-4 dialogue-box rounded-2xl p-6 max-w-2xl">
        <div class="text-pink-400 font-bold text-xl mb-3" id="name">Mia</div>
        <p id="dialogue" class="text-lg leading-relaxed min-h-[100px]"></p>
      </div>

      <!-- Choices -->
      <div id="choices" class="absolute bottom-40 left-4 right-4 space-y-3 max-w-2xl"></div>
    </div>
  </div>

  <script>
    let currentScene = 1;
    let affection = 0;

    const scenes = { /* data sama seperti tadi */ };

    function showScene(id) {
      // Logic game
      document.getElementById('dialogue').innerHTML = "Demo sederhana. Mau versi lengkap?";
    }

    function resetGame() {
      currentScene = 1;
      affection = 0;
      showScene(1);
    }

    // Mulai game
    showScene(1);
  </script>
</body>
</html>
